<html>
    <head>
        <title>list-style-type</title>
    </head>
    <style>
        ol{
            list-style-type: lower-roman;
        }
    </style>
    <body>
        <h1>The Comlete Poems</h1>
        <h2>Emily Dickinson</h2>
        <ol>
            <li>Life</li>
            <li>Nature</li>
            <li>Love</li>
            <li>Time and Eternity</li>
            <li>The Single Hound</li>
        </ol>
    </body>
</html>
