<html>
    <head>
        <title>visibility</title>
    </head>
    <style>
        li{
            display: inline;
            margin-right: 10px;
        }
        li.coming-soon{
            visibility: hidden;
        }
    </style>
    <body>
        <ul>
            <li>Home</li>
            <li>Products</li>
            <li class="coming-soon">Service</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </body>
</html>
