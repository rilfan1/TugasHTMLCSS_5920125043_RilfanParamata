<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gradient</title>
</head>
<style>
p#gradient {
/* fallback color */
background-color: #66cccc;
/* fallback image */
background-image: url(gradient.jpeg);
/* gradient modern */
background-image: linear-gradient(#336666, #66ccc6);
height: 150px;
width: 300px;}
</style>
<body>
    <p class="gradient" id="gradient"></p>
</body>
</html>
