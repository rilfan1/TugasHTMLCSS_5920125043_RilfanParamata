<html>
    <head>
        <title>image-sizes</title>
    </head>
    <style>
     img.large{
         width: 500px;
        height: 500px;
              }
     img.medium{
        width: 250px;
        height: 250px;
     }         
     img.small{
        width: 100px;
        height: 100px;
     }
    </style>
    <body>
    <img src="imagesmagnolia-large 1.jpeg"
     class="large" alt="Magnolia" /> 
    <img src="imagesmagnolia-large 2.jpeg"
     class="medium" alt="Magnolia" /> 
    <img src="imagesmagnolia-large 3.jpeg"
     class="small" alt="Magnolia" />
</body>
</html>
