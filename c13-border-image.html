<html>
    <head>
        <title>border-image</title>
    </head>
    <style>
        p.one { -moz-border-image: url("naleng.jpeg") 
11 11 11 11 stretch; -webkit-border-image: url("naleng.jpeg") 
11 11 11 11 stretch;
border-image: url("naleng.jpeg") 
11 11 11 11 stretch;}
p.two {-moz-border-image: url("jeko.jpeg") 
11 11 11 11 round; -webkit-border-image: url("jeko.jpeg") 
11 11 11 11 round; 
border-image: url("jeko.jpeg") 
11 11 11 11 round;}
    </style>
    <body>
        <p class="one"><img src="naleng.jpeg" alt=""></p>
        <p class="two"><img src="jeko.jpeg" alt=""></p>
        <p class="three"></p>
    </body>
</html>
