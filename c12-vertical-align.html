<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vertical align</title>
</head>
<style>
    #six-months { vertical-align: text-top;}
    #one-year { vertical-align: baseline;}
    #two-year { vertical-align: text-bottom;}
</style>
<body>
    <h2>Briard Life Stages</h2>
    <p>
        <img src="six month.jpeg" width="50px" height="50px" class="Six months">Six months
    </p>
    <p>
         <img src="one years.jpeg" width="50px" height="50px" class="One year">One year
    </p>
    <p>
         <img src="two years.jpeg" width="50px" height="50px" class="Two year">Two year
    </p>
</body>
</html>
